<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AutoSense AI – Home</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #16a34a;
      --green-light: #dcfce7;
      --red: #dc2626;
      --red-light: #fee2e2;
      --blue: #2563eb;
      --blue-light: #dbeafe;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --bg: #ffffff;
      --card: #f9fafb;
    }

    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }

    /* NAV */
    nav { border-bottom: 1px solid var(--border); padding: 0 2rem; }
    .nav-top { display: flex; align-items: center; gap: 2rem; padding: 0.75rem 0; flex-wrap: wrap; }
    .logo { display: flex; align-items: center; gap: 0.5rem; font-weight: 600; font-size: 1rem; text-decoration: none; color: var(--text); }
    .logo-icon { background: var(--green); color: #fff; width: 30px; height: 30px; border-radius: 7px; display: grid; place-items: center; font-size: 1rem; }
    .nav-links { display: flex; gap: 0.25rem; flex-wrap: wrap; }
    .nav-links a { text-decoration: none; color: var(--muted); font-size: 0.875rem; padding: 0.35rem 0.75rem; border-radius: 6px; transition: background 0.15s; }
    .nav-links a:hover, .nav-links a.active { background: var(--border); color: var(--text); }
    .nav-bottom { display: flex; gap: 0.25rem; flex-wrap: wrap; padding: 0.5rem 0; border-top: 1px solid var(--border); }
    .nav-bottom a { text-decoration: none; color: var(--muted); font-size: 0.8rem; padding: 0.3rem 0.65rem; border-radius: 5px; transition: background 0.15s; }
    .nav-bottom a:hover { background: var(--border); color: var(--text); }

    /* HERO */
    .hero { text-align: center; padding: 4rem 2rem 3rem; }
    .badge { display: inline-flex; align-items: center; gap: 0.4rem; background: var(--green-light); color: var(--green); font-size: 0.78rem; font-weight: 500; padding: 0.35rem 0.9rem; border-radius: 999px; margin-bottom: 1.5rem; }
    .hero h1 { font-family: 'DM Serif Display', serif; font-size: clamp(2rem, 5vw, 3rem); line-height: 1.2; margin-bottom: 1rem; }
    .hero h1 span { color: var(--green); }
    .hero p { color: var(--muted); max-width: 520px; margin: 0 auto; font-size: 1rem; line-height: 1.6; }

    /* STATS */
    .stats { display: flex; justify-content: center; gap: 4rem; flex-wrap: wrap; padding: 2rem; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); margin: 2rem 2rem; }
    .stat label { font-size: 0.78rem; color: var(--muted); display: block; margin-bottom: 0.25rem; }
    .stat .num { font-family: 'DM Serif Display', serif; font-size: 2rem; }
    .stat .tag { font-size: 0.78rem; font-weight: 600; margin-top: 0.2rem; }
    .tag-green { color: var(--green); }
    .tag-red { color: var(--red); }
    .tag-blue { color: var(--blue); }

    /* CARDS */
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; padding: 0 2rem; max-width: 900px; margin: 0 auto; }
    .card { border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; cursor: pointer; transition: box-shadow 0.15s; background: var(--bg); }
    .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.07); }
    .card-badge { display: inline-block; font-size: 0.72rem; font-weight: 600; padding: 0.2rem 0.6rem; border-radius: 5px; margin-bottom: 0.75rem; }
    .badge-green { background: var(--green-light); color: var(--green); }
    .badge-red { background: var(--red-light); color: var(--red); }
    .badge-blue { background: var(--blue-light); color: var(--blue); }
    .card h3 { font-size: 0.95rem; font-weight: 600; margin-bottom: 0.4rem; }
    .card p { font-size: 0.82rem; color: var(--muted); line-height: 1.5; }
    .card-blue-border { border-left: 3px solid var(--blue); }
    .card-red-border { border-left: 3px solid var(--red); }
    .card-green-border { border-left: 3px solid var(--green); }

    /* SPECIAL TOOLS */
    .section-label { padding: 2rem 2rem 0.75rem; font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; color: var(--muted); text-transform: uppercase; }
    .tools { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 0.75rem; padding: 0 2rem; max-width: 900px; margin: 0 auto; }
    .tool-card { border: 1px solid var(--border); border-radius: 10px; padding: 1rem; cursor: pointer; transition: background 0.15s; }
    .tool-card:hover { background: var(--card); }
    .tool-card h4 { font-size: 0.875rem; font-weight: 600; margin-bottom: 0.2rem; }
    .tool-card p { font-size: 0.78rem; color: var(--muted); }
    :root {
      --green: #16a34a;
      --green-light: #dcfce7;
      --red: #dc2626;
      --red-light: #fee2e2;
      --blue: #2563eb;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --bg: #ffffff;
      --card: #f9fafb;
    }

    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }

    nav { border-bottom: 1px solid var(--border); padding: 0 2rem; }
    .nav-top { display: flex; align-items: center; gap: 2rem; padding: 0.75rem 0; flex-wrap: wrap; }
    .logo { display: flex; align-items: center; gap: 0.5rem; font-weight: 600; font-size: 1rem; text-decoration: none; color: var(--text); }
    .logo-icon { background: var(--green); color: #fff; width: 30px; height: 30px; border-radius: 7px; display: grid; place-items: center; font-size: 1rem; }
    .nav-links { display: flex; gap: 0.25rem; flex-wrap: wrap; }
    .nav-links a { text-decoration: none; color: var(--muted); font-size: 0.875rem; padding: 0.35rem 0.75rem; border-radius: 6px; transition: background 0.15s; }
    .nav-links a:hover { background: var(--border); color: var(--text); }
    .nav-links a.active { background: var(--text); color: #fff; }
    .nav-bottom { display: flex; gap: 0.25rem; flex-wrap: wrap; padding: 0.5rem 0; border-top: 1px solid var(--border); }
    .nav-bottom a { text-decoration: none; color: var(--muted); font-size: 0.8rem; padding: 0.3rem 0.65rem; border-radius: 5px; transition: background 0.15s; }
    .nav-bottom a:hover { background: var(--border); color: var(--text); }

    .main { max-width: 560px; margin: 3rem auto; padding: 0 1.5rem; }

    .card { border: 1px solid var(--border); border-radius: 14px; padding: 2rem; background: var(--bg); }
    .card h2 { font-size: 1.15rem; font-weight: 600; margin-bottom: 0.3rem; }
    .card .sub { font-size: 0.85rem; color: var(--muted); margin-bottom: 1.5rem; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    .form-group { display: flex; flex-direction: column; gap: 0.35rem; }
    .form-group label { font-size: 0.8rem; font-weight: 500; color: var(--muted); }
    .form-group select,
    .form-group input { border: 1px solid var(--border); border-radius: 8px; padding: 0.6rem 0.85rem; font-size: 0.9rem; font-family: inherit; outline: none; width: 100%; background: var(--bg); color: var(--text); transition: border 0.15s; }
    .form-group select:focus,
    .form-group input:focus { border-color: #9ca3af; }

    .full { grid-column: 1 / -1; }

    button[type="submit"] {
      width: 100%; padding: 0.75rem; background: var(--text); color: #fff;
      border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600;
      font-family: inherit; cursor: pointer; margin-top: 0.5rem; transition: opacity 0.15s;
    }
    button[type="submit"]:hover { opacity: 0.85; }
    button[type="button"] {
      width: 100%; padding: 0.75rem; background: var(--text); color: #fff;
      border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 600;
      font-family: inherit; cursor: pointer; margin-top: 0.5rem; transition: opacity 0.15s;
      margin-bottom: 50px;
    }
    button[type="button"]:hover { opacity: 0.85; }

    .result { margin-top: 1.25rem; background: var(--green-light); border-radius: 10px; padding: 1.25rem; }
    .result .label { font-size: 0.78rem; font-weight: 600; color: var(--green); margin-bottom: 0.75rem; }
    .result-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 0.75rem; }
    .result-row .left label { font-size: 0.75rem; color: var(--muted); }
    .result-row .left .price { font-family: 'DM Serif Display', serif; font-size: 1.75rem; color: var(--green); }
    .result-row .right { text-align: right; }
    .result-row .right label { font-size: 0.75rem; color: var(--muted); }
    .result-row .right .price { font-size: 1rem; font-weight: 600; color: var(--muted); text-decoration: line-through; }
    .verdict { background: var(--red); color: #fff; border-radius: 7px; padding: 0.6rem 1rem; font-size: 0.85rem; font-weight: 600; text-align: center; }

    .hidden { display: none; }

    .page-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2rem;
  align-items: start;
}
  </style>
</head>
<body>

<nav>
  <div class="nav-top">
    <a href="/" class="logo">
      <span class="logo-icon">⚡</span> AutoSense AI
    </a>
    <div class="nav-links">
      <a href="/" class="active">Home</a>
      <a href="/ev_predictor">EV predictor</a>
      <a href="/resale_prices">Resale Estimator</a>
      <a href="/fair_price">Fair price check</a>
    
    <a href="/budget_finder">Budget finder</a>
  
  </div>
</nav>

{% block content %}
{% endblock %}

</body>
</html>
