{% extends "base.html" %}

{% block content %}
<style>
    .main {
        max-width: 1200px !important;
        /* override base CSS */
        margin: 2rem auto;
        padding: 0 2rem;
    }

    .page-layout {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2rem;
        align-items: start;
    }

    @media (max-width: 768px) {
        .page-layout {
            grid-template-columns: 1fr;
        }
    }
      .page-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
    align-items: start;
  }

  .result-panel {
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 2rem;
    background: var(--card);
    position: sticky;
    top: 2rem;
    min-height: 300px;
    
    align-items: center;
    justify-content: center;
  }

  .result-placeholder {
    text-align: center;
    color: var(--muted);
  }

  .placeholder-icon {
    font-size: 2.5rem;
    margin-bottom: 1rem;
    opacity: 0.4;
  }

  .result-placeholder p {
    font-size: 0.875rem;
    line-height: 1.6;
    max-width: 220px;
    margin: 0 auto;
  }

  .result-content {
    width: 100%;
  }

  .result-content .label {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--muted);
    margin-bottom: 0.75rem;
  }

  .predicted-price {
    font-family: 'DM Serif Display', serif;
    font-size: 2.75rem;
    color: var(--green);
    line-height: 1;
    margin-bottom: 0.35rem;
  }
  .form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;  /* 2 sliders per row */
  gap: 1rem;
}

  .price-sub {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 1.25rem;
  }

  .result-content hr {
    border: none;
    border-top: 1px solid var(--border);
    margin-bottom: 1.25rem;
  }

  .spec-summary {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .spec-row {
    display: flex;
    justify-content: space-between;
    font-size: 0.82rem;
  }
.main { max-width: 1200px; margin: 2rem auto; padding: 0 2rem; }

.page-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2rem;
  align-items: start;
  width: 100%;
}

  .spec-row span:first-child { color: var(--muted); }
  .spec-row span:last-child { font-weight: 600; }

  .hidden { display: none; }

  @media (max-width: 700px) {
    .page-layout { grid-template-columns: 1fr; }
    .result-panel { position: static; }
  }
</style>

</script>
<script>
    // on page load, restore active tab if result came back
    const activeType = "{{ vehicle_type if vehicle_type else 'car' }}";
    switchTo(activeType);

    function switchTo(type) {
        document.getElementById('carForm').classList.toggle('hidden', type !== 'car');
        document.getElementById('bikeForm').classList.toggle('hidden', type !== 'bike');
        document.getElementById('btnCar').classList.toggle('active', type === 'car');
        document.getElementById('btnBike').classList.toggle('active', type === 'bike');
    }
